<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash Parrot MVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 8px;
      font-size: 32px;
    }

    .subtitle {
      margin-bottom: 28px;
      color: #666;
      font-size: 16px;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      margin-top: 28px;
      background: #111827;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 18px;
      font-size: 15px;
      color: #444;
    }

    .brand {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">ASH PARROT MVP</div>
    <h1>I’m listening.</h1>
    <p class="subtitle">Enter your text and choose your language pair.</p>

    <form
      id="ashForm"
      action="https://script.google.com/macros/s/AKfycbxWd6h6FTJfCmFSJxNxV1PUMUorqneWYseJlFpGnHIaGM76S8EG07Vjv_RPMMrfN8M/exec"
      method="POST"
      target="hiddenFrame"
    >
      <input type="hidden" name="secret" value="ash-parrot-local-secret-804608" />

      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required />

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="message">Script / Text</label>
      <textarea id="message" name="message" placeholder="Type your script here..." required></textarea>

      <label for="source_lang">Source Language</label>
      <select id="source_lang" name="source_lang" required>
        <option value="Korean">Korean</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese</option>
        <option value="Chinese">Chinese</option>
      </select>

      <label for="target_lang">Target Language</label>
      <select id="target_lang" name="target_lang" required>
        <option value="English">English</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="Chinese">Chinese</option>
      </select>

      <button type="submit">Generate</button>
      <div class="status" id="status"></div>
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>
  </div>

  <script>
    const form = document.getElementById("ashForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", function () {
      status.textContent = "Got it. I hear you. Please check Google Sheets.";
      setTimeout(function () {
        form.reset();
      }, 500);
    });
  </script>
</body>
</html>
